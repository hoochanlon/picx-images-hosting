<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<title>Index of ./photos</title>
<style>
  body { font-family: Arial, sans-serif; line-height: 1.7; padding: 0 20px; }
  ul { list-style: none; padding-left: 0; }

  li {
    margin: 6px 0;
    display: flex;
    align-items: center;
  }

  .left {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;          /* 占满剩余宽度，把按钮顶到右侧 */
    min-width: 0;     /* 允许内部元素缩到省略号 */
  }

  .right {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;   /* 不被压缩，保持按钮在右侧一列 */
    margin-left: 12px;
  }

  a { color: #0366d6; text-decoration: none; }
  a:hover { text-decoration: underline; }

  .topbar {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    background: #f7f7f7;
    border-bottom: 1px solid #ccc;
    padding: 12px 20px;
    z-index: 1000;
  }

  .container { margin-top: 90px; }

  .file::before   { content: "📄 "; }
  .folder::before { content: "📁 "; }
  .image::before  { content: "🖼 "; }

  .preview-btn, .copy-btn {
    padding: 2px 6px;
    background: #eee;
    border: 1px solid #ccc;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.8em;
  }
  .preview-btn:hover, .copy-btn:hover { background: #ddd; }

  #lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.75);
    justify-content: center;
    align-items: center;
    z-index: 2000;
  }

  #lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 6px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }

  .file-name {
    display: inline-block;
    max-width: 100%;           /* 跟随 left 宽度 */
    overflow: hidden;
    text-overflow: ellipsis;   /* 省略号 */
    white-space: nowrap;
  }

  .breadcrumb {
    font-size: 1em;
    margin-bottom: 10px;
  }
</style>
<script>
function showImage(src) {
  const lb = document.getElementById("lightbox");
  const img = document.getElementById("lightbox-img");
  img.src = src;
  lb.style.display = "flex";
}

function hideLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

function copyPath(src) {
  const fullUrl = "https://hoochanlon.github.io/picx-images-hosting/" + src.replace(/^\.\//, "");
  navigator.clipboard.writeText(fullUrl);
}
</script>
</head><body>
<div id="lightbox" onclick="hideLightbox()">
  <img id="lightbox-img" src="">
</div>

</ul>
</div></body></html>

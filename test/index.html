<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<title>Index of test</title>
<style>
    body { font-family: Arial, sans-serif; padding: 10px 20px; line-height: 1.6; }

    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }

    ul { list-style: none; padding-left: 0; }
    .item-row { display: flex; align-items: center; margin-bottom: 4px; }

    .filename {
      display: inline-block;
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 8px;
    }

    .btn {
      margin-left: 6px;
      padding: 2px 6px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #aaa;
      border-radius: 4px;
      background: #eee;
    }
    .btn:hover { background: #ddd; }

    /* 预览灯箱 */
    #lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #lightbox img {
      max-width: 90%;
      max-height: 90%;
      border: 6px solid white;
      border-radius: 6px;
    }

  </style>
</head><body>
<div style="margin-bottom: 16px;"><strong>📁 Index Navigation:</strong> 
        <a href="">Home</a>
 | <a href="../">⬆ Go Up</a>
</div>
<h2>Index of ./test</h2>
<ul>
<li class="item-row">
🖼️
<a class="filename" href="1.txt">1.txt</a>
<button class="btn" onclick="copyPath()">复制url</button>
</li>
</ul>
<div id="lightbox" onclick="hideLightbox()">
  <img id="lightbox-img">
</div>

<script>
function showImage(src) {
  const lb = document.getElementById("lightbox");
  const img = document.getElementById("lightbox-img");
  img.src = src;
  lb.style.display = "flex";
}
function hideLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

function copyPath(path) {
  const fullUrl = "/" + path.replace(/^\//, "");
  navigator.clipboard.writeText(fullUrl);
}
</script>
</body></html>

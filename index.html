  li {

  /* 文件名区域（固定宽度 650px，使按钮对齐在“蓝框”区域） */

  .right {

    max-width: 90%;

    gap: 12px;

    display: flex;
    align-items: center;
    gap: 12px;
  }

    max-width: 80vw;
    max-height: 70vh;
    border-radius: 6px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    background: #222;

    background: rgba(255,255,255,0.85);
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }

  .lb-nav:disabled {
    opacity: 0.4;
    cursor: default;
  }

  .lightbox-footer {
    width: 100%;
    background: rgba(0,0,0,0.65);
    padding: 8px 12px;
    border-radius: 6px;
    color: #fff;
    font-size: 0.85em;
    box-sizing: border-box;
  }

  .lightbox-url-text {
    margin-bottom: 4px;
    word-break: break-all;
  }

  .lightbox-url-actions {
    display: flex;
    gap: 8px;
  }

  #lightbox-url-input {
    flex: 1;
    font-size: 0.85em;
    padding: 4px 6px;
    border-radius: 4px;
    border: 1px solid #444;
    background: #111;
    color: #fff;
  }

  .breadcrumb {
    font-size: 1em;
    margin-bottom: 10px;
  }

  .file-name {
    display: inline-block;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
</style>
<script>
let imageList = [];   // 每个元素: { src, fullUrl }
let currentIndex = -1;

function openLightbox(index) {
  const lb = document.getElementById("lightbox");
  const img = document.getElementById("lightbox-img");
  const urlInput = document.getElementById("lightbox-url-input");

  if (!imageList.length || index < 0 || index >= imageList.length) return;

  currentIndex = index;
  const item = imageList[index];

  img.src = item.src;

  // 正确赋值完整 URL 到输入框
  if (urlInput) urlInput.value = item.fullUrl;

  // 更新左右按钮可用状态
  const prevBtn = document.getElementById("lb-prev");
  const nextBtn = document.getElementById("lb-next");
  if (prevBtn) prevBtn.disabled = (index <= 0);
  if (nextBtn) nextBtn.disabled = (index >= imageList.length - 1);

  lb.style.display = "flex";
}

function closeLightbox() {
  const lb = document.getElementById("lightbox");
  if (lb) lb.style.display = "none";
}

function showPrev() {
  if (currentIndex > 0) {
    openLightbox(currentIndex - 1);
  }
}

function showNext() {
  if (currentIndex >= 0 && currentIndex < imageList.length - 1) {
    openLightbox(currentIndex + 1);
  }
}

// 列表里的“复制url”按钮：传入的是相对路径 url_path
function copyPath(src) {
  const fullUrl = "https://hoochanlon.github.io/picx-images-hosting/" + src.replace(/^\.\//, "");
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(fullUrl);
  } else {
    const temp = document.createElement("input");
    temp.value = fullUrl;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand("copy");
    document.body.removeChild(temp);
  }
}

// Lightbox 底部区域的“复制url”
function copyCurrentUrl() {
  const input = document.getElementById("lightbox-url-input");
  if (!input) return;
  input.select();
  input.setSelectionRange(0, 99999);

  // 复制 URL
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(input.value);
  } else {
    document.execCommand("copy");
  }
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    closeLightbox();
  } else if (e.key === "ArrowLeft") {
    showPrev();
  } else if (e.key === "ArrowRight") {
    showNext();
  }
});
</script>

      <img id="lightbox-img" src="">
      <button id="lb-next" class="lb-nav" onclick="event.stopPropagation(); showNext()">&#8594;</button>
    </div>
    <div class="lightbox-footer">
      <div class="lightbox-url-actions">
        <input id="lightbox-url-input" readonly>
        <button class="copy-btn" onclick="copyCurrentUrl()">复制url</button>

    </div>
